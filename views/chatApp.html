<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/chat.css">
</head>

<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <button id="makeGroup">Make A Group</button>
        <button id="logOutBtn">Log Out</button>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">

        <!-- Left: Groups -->
        <div id="groupContainer" class="group-panel">
            <h5>My Group</h5>
            <ol id="groupList"></ol>
        </div>

        <!-- Right: Chat Section -->
        <div class="chat-panel">

            <h4 class="text-center mb-3">Chat App</h4>

            <!-- Online Users -->
            <div id="userSection" class="mb-3">
                <table id="onlineSection" class="table table-sm">
                    <tbody id="userBody"></tbody>
                </table>
            </div>

            <!-- Chat Messages -->
            <div id="chatSection" class="chat-box">
                <table id="chatTable" class="table">
                    <tbody id="chatBody"></tbody>
                </table>
            </div>

            <!-- Message Input -->
            <div class="message-box">
                <form id="message-form">
                    <input id="messageBox" placeholder="Write Your Message Here">
                    <button id="sendChatBtn">Send</button>
                </form>
            </div>

        </div>

    </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.5.1/axios.min.js"></script>
<script src="chatApp.js"></script>
<script src="groupChatPage.js"></script>
<script src="groupChat.js"></script>
</html>
