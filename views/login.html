<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/login.css">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <h3 class="title-main">Log In Page</h3>

    <div class="main-container">
        
        <div class="card-clean">

            <form id="login" method="post">

                <h5 class="title">
                    Enter The Credentials
                </h5>

                <div class="mb-3">
                    <label>User Name</label>
                    <input type="email" id="userEmail" placeholder="Enter Your Email" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" id="userPassword" placeholder="Enter Your Password" class="form-control">
                </div>

                <div class="mb-3 d-flex gap-2">
                    <button type="submit" id="loginBtn" class="btn btn-primary w-100">Login</button>
                    <button type="submit" id="forgot-password-btn" class="btn btn-outline-secondary w-100">Forgot Password</button>
                </div>

                <h6 class="text-center">
                    New User-<a href="/signup" id="signupPage">SignUp Now</a>
                </h6>

            </form>

        </div>
    </div>

</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.5.1/axios.min.js"></script>
<script src="login.js"></script>
</html>
